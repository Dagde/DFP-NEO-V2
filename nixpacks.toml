[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]

[phases.install]
cmds = ["cd DFP-NEO-V2-fresh/dfp-neo-platform && npm ci"]

[phases.build]
cmds = ["cd DFP-NEO-V2-fresh/dfp-neo-platform && npm run build"]

[start]
cmd = "cd DFP-NEO-V2-fresh/dfp-neo-platform && npx prisma migrate deploy && npm run start"